<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
      <a class="navbar-brand" href="#">Mi Dashboard</a>
      <button class="btn btn-outline-light" id="btnCerrarSesion">Cerrar sesión</button>
    </div>
  </nav>

  <div class="container mt-5">
    <div class="card shadow p-4">
      <h1 id="mensajeBienvenida" class="mb-4">Bienvenido</h1>
      <p>Este es tu panel de usuario. Aquí puedes agregar más funcionalidades según tus necesidades.</p>
      <div class="mt-3">
        <h4>Información de usuario:</h4>
        <ul id="infoUsuario" class="list-group mt-3">
          <!-- La información del usuario se mostrará aquí -->
        </ul>
      </div>
      <div class="mt-4">
        <a href="estudio.html" class="btn btn-primary">Ir a la sección de Estudio</a>
      </div>
    </div>
  </div>

  <script>
    // Verificar si hay sesión iniciada
    const usuarioActual = JSON.parse(localStorage.getItem("usuarioActual"));
    
    // Si no hay sesión, redirigir al login
    if (!usuarioActual) {
      window.location.href = "login.html";
    } else {
      // Mostrar información del usuario
      document.getElementById("mensajeBienvenida").textContent = `Bienvenido, ${usuarioActual.nombre}`;
      
      // Mostrar detalles del usuario
      const infoUsuario = document.getElementById("infoUsuario");
      infoUsuario.innerHTML = `
        <li class="list-group-item"><strong>Nombre:</strong> ${usuarioActual.nombre}</li>
        <li class="list-group-item"><strong>Email:</strong> ${usuarioActual.email}</li>
        <li class="list-group-item"><strong>Rol:</strong> ${usuarioActual.rol}</li>
      `;
      
      // Configurar botón de cerrar sesión
      document.getElementById("btnCerrarSesion").addEventListener("click", function() {
        localStorage.removeItem("usuarioActual");
        window.location.href = "login.html";
      });
    }
  </script>
</body>
</html>
