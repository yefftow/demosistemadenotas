<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <div class="container mt-5">
    <div class="card shadow p-4">
      <h2 class="mb-4 text-center">Iniciar Sesión</h2>
      
      <!-- Alerta para mensajes -->
      <div id="mensajeAlerta" class="alert d-none"></div>
      
      <form id="formularioLogin">
        <div class="mb-3">
          <label for="email" class="form-label">Correo electrónico</label>
          <input type="email" id="email" class="form-control" required>
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Contraseña</label>
          <input type="password" id="password" class="form-control" required>
        </div>
        <div class="d-grid gap-2">
          <button type="submit" class="btn btn-success">Ingresar</button>
        </div>
        <p class="mt-3 text-center">¿No tienes una cuenta? <a href="registro.html">Regístrate aquí</a></p>
      </form>
    </div>
  </div>

  <script>
    // Verificar si ya hay sesión iniciada
    const usuarioActual = JSON.parse(localStorage.getItem("usuarioActual"));
    if (usuarioActual) {
      window.location.href = "dashboard.html";
    }
    
    // Código específico para la página de login
    document.getElementById("formularioLogin").addEventListener("submit", function(e) {
      e.preventDefault();
      
      // Obtener valores
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      
      // Obtener usuarios
      const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
      
      // Buscar usuario
      const usuario = usuarios.find(u => u.email === email && u.password === password);
      
      if (usuario) {
        // Guardar sesión
        localStorage.setItem("usuarioActual", JSON.stringify(usuario));
        
        // Mostrar mensaje de éxito
        mostrarMensaje("¡Inicio de sesión exitoso! Redirigiendo...", "success");
        
        // Redireccionar al dashboard
        setTimeout(() => {
          window.location.href = "dashboard.html";
        }, 1500);
      } else {
        mostrarMensaje("Correo o contraseña incorrectos", "danger");
      }
    });
    
    // Función para mostrar mensajes
    function mostrarMensaje(texto, tipo) {
      const alerta = document.getElementById("mensajeAlerta");
      alerta.textContent = texto;
      alerta.className = `alert alert-${tipo}`;
      alerta.classList.remove("d-none");
    }
  </script>
</body>
</html>
